steps:
  # Build and push backend image
  - id: build-backend
    name: "gcr.io/cloud-builders/docker"
    waitFor: ["-"]
    args:
      [
        "build",
        "-t",
        "us-central1-docker.pkg.dev/genai-apac-test/cloud-run-source-deploy/vibe-weather-agent:latest",
        ".",
      ]
  - id: push-backend
    name: "gcr.io/cloud-builders/docker"
    waitFor: ["build-backend"]
    args:
      [
        "push",
        "us-central1-docker.pkg.dev/genai-apac-test/cloud-run-source-deploy/vibe-weather-agent:latest",
      ]

  # Deploy backend as Cloud Run service
  - id: deploy-backend
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    waitFor: ["push-backend"]
    entrypoint: "gcloud"
    args:
      [
        "run",
        "deploy",
        "vibe-weather-agent",
        "--image=us-central1-docker.pkg.dev/genai-apac-test/cloud-run-source-deploy/vibe-weather-agent:latest",
        "--region=us-central1",
        "--platform=managed",
      ]

images:
  - "us-central1-docker.pkg.dev/genai-apac-test/cloud-run-source-deploy/vibe-weather-agent:latest"

options:
  logging: CLOUD_LOGGING_ONLY
